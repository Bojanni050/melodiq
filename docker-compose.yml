services:
  app:
    build: .
    container_name: sonara_app
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env.production
    depends_on:
      db:
        condition: service_healthy
    networks:
      - sonara_net

  db:
    image: postgres:16-alpine
    container_name: sonara_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: sonara
      POSTGRES_USER: sonara
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sonara"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sonara_net

volumes:
  postgres_data:

networks:
  sonara_net:
    driver: bridge